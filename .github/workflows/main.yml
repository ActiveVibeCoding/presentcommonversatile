name: Build IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build App
        run: xcodebuild build -scheme VibeDrive -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO -destination 'generic/platform=iOS'

      - name: Package IPA
        run: |
          mkdir -p Payload
          # This finds the compiled .app and copies it into the Payload folder
          find . -name "*.app" -type d -exec cp -r {} Payload/ \;
          zip -r VibeDrive.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeDrive-IPA
          path: VibeDrive.ipa
