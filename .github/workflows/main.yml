name: Build
on: push

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive App
        run: |
          xcodebuild archive \
            -scheme VibeDrive \
            -destination 'generic/platform=iOS' \
            -archivePath ./VibeDrive.xcarchive \
            -sdk iphoneos \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # The archive command puts the .app inside the 'Products/usr/local/bin' or 'Products/Applications' folder
          APP_PATH=$(find ./VibeDrive.xcarchive -name "*.app" -type d | head -n 1)
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r VibeDrive.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VibeDrive-IPA
          path: VibeDrive.ipa
