name: Build
on: push

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          # 1. Generate an Xcode project from the Swift Package
          swift package generate-xcodeproj
          # 2. Build that project specifically for iOS
          xcodebuild build -project VibeDrive.xcodeproj -scheme VibeDrive -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package
        run: |
          mkdir -p Payload
          # Search specifically for the .app bundle inside the build products
          APP_PATH=$(find . -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          echo "Found: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r VibeDrive.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VibeDrive-IPA
          path: VibeDrive.ipa
