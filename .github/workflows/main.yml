name: Build
on: push

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Executable
        run: |
          xcodebuild build \
            -scheme VibeDrive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          # 1. Create the App Bundle structure
          mkdir -p Payload/VibeDrive.app
          
          # 2. Find the executable binary
          BINARY_PATH=$(find ./build -type f -name "VibeDrive" | grep "Release-iphoneos" | head -n 1)
          echo "Found Binary at: $BINARY_PATH"
          
          # 3. Copy binary into the folder
          cp "$BINARY_PATH" Payload/VibeDrive.app/VibeDrive
          
          # 4. Create a basic Info.plist so iOS recognizes it as an app
          cat <<EOF > Payload/VibeDrive.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>VibeDrive</string>
              <key>CFBundleIdentifier</key>
              <string>com.vibedrive.app</string>
              <key>CFBundleName</key>
              <string>VibeDrive</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>
          EOF
          
          # 5. Zip it up
          zip -r VibeDrive.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VibeDrive-IPA
          path: VibeDrive.ipa
