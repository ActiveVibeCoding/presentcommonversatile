name: Build
on: push

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: xcodebuild build -scheme VibeDrive -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO -destination 'generic/platform=iOS'

      - name: Package
        run: |
          mkdir -p Payload
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d -not -path "*.xcresult*" | head -n 1)
          if [ -z "$APP_PATH" ]; then APP_PATH=$(find . -name "*.app" -type d | head -n 1); fi
          echo "Found: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r VibeDrive.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VibeDrive-IPA
          path: VibeDrive.ipa
