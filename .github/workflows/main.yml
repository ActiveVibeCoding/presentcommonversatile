name: Build IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build App
        run: |
          # This builds the app. Replace 'YourAppName' with your target name
          xcodebuild build -scheme YourAppName -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Find the .app and move it to Payload
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r YourApp.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-car-app
          path: YourApp.ipa
