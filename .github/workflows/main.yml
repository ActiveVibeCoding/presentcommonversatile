      - name: Package IPA
        run: |
          mkdir -p Payload
          # Search for any .app folder created in the build directory
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d -not -path "*.xcresult*" | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "SUCCESS: Found app at $APP_PATH"
            cp -r "$APP_PATH" Payload/
          else
            echo "ERROR: No .app folder found in DerivedData"
            # Final fallback: look in the current workspace
            FALLBACK_PATH=$(find . -name "*.app" -type d | head -n 1)
            if [ -n "$FALLBACK_PATH" ]; then
                echo "SUCCESS: Found app at $FALLBACK_PATH"
                cp -r "$FALLBACK_PATH" Payload/
            else
                echo "CRITICAL ERROR: Build output not found anywhere"
                exit 1
            fi
          fi
          
          zip -r VibeDrive.ipa Payload
